<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>اوج وین CRM</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#145E61">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0F1B2D;
    --navy-2:#16273D;
    --slate:#24405C;
    --gold:#C9A227;
    --gold-soft:#E4C868;
    --off:#F5F3EE;
    --off-2:#EDEAE1;
    --ink:#0F1B2D;
    --muted:#6B7686;
    --green:#2F9E44;
    --red:#D64545;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Vazirmatn',Tahoma,sans-serif;
    background:var(--off);
    color:var(--ink);
    overscroll-behavior-y:none;
  }
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  @keyframes fadeUp{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

  header.top{
    background:linear-gradient(135deg,var(--navy) 0%, var(--navy-2) 60%, var(--slate) 100%);
    color:var(--off);
    padding:18px 18px 22px;
    position:relative;
    overflow:hidden;
    flex-shrink:0;
  }
  header.top svg.peaks{position:absolute;bottom:-2px;right:-10%;width:120%;opacity:.35;}
  .brand{display:flex;align-items:center;gap:10px;position:relative;z-index:2;}
  .brand-mark{width:34px;height:34px;border-radius:9px;overflow:hidden;flex-shrink:0;display:block;object-fit:cover;box-shadow:0 0 0 1px rgba(255,255,255,.15);}
  .brand-text{font-weight:800;font-size:19px;letter-spacing:.2px;}
  .brand-sub{font-size:11px;color:var(--gold-soft);font-weight:500;margin-top:1px;}
  .page-title{margin-top:16px;font-size:22px;font-weight:800;position:relative;z-index:2;}
  .page-sub{font-size:12.5px;color:#C8D2DE;margin-top:2px;position:relative;z-index:2;}
  .menu-btn{position:absolute;top:18px;left:18px;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.14);border:none;display:flex;align-items:center;justify-content:center;z-index:3;}
  .menu-btn svg{width:18px;height:18px;stroke:#fff;}

  main{flex:1;overflow-y:auto;padding:16px 14px 90px;}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .stat-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:0 1px 3px rgba(15,27,45,.06);border:1px solid #EAE6DA;animation:fadeUp .25s ease both;}
  .stat-num{font-size:22px;font-weight:800;color:var(--navy);}
  .stat-label{font-size:12px;color:var(--muted);margin-top:3px;}
  .stat-accent{width:26px;height:3px;border-radius:3px;background:var(--gold);margin-top:8px;}

  .section-title{font-size:15px;font-weight:700;margin:6px 2px 10px;color:var(--navy);display:flex;align-items:center;justify-content:space-between;}
  .section-title small{font-size:11.5px;color:var(--muted);font-weight:500;}

  .info-note{background:#EFF3F7;border:1px solid #DCE4EC;border-radius:11px;padding:10px 12px;font-size:12px;color:var(--slate);margin-bottom:14px;line-height:1.9;}

  .task-row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #EAE6DA;border-radius:12px;padding:11px 12px;margin-bottom:8px;animation:fadeUp .25s ease both;}
  .task-row.done{opacity:.5;}
  .task-row.done .task-title{text-decoration:line-through;}
  .checkbox{width:20px;height:20px;border-radius:50%;border:2px solid var(--gold);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .checkbox.checked{background:var(--gold);}
  .task-title{font-size:13.5px;font-weight:600;flex:1;}
  .task-meta{font-size:11px;color:var(--muted);}
  .chip{display:inline-block;font-size:10.5px;background:var(--off-2);color:var(--slate);border-radius:20px;padding:1px 8px;margin-inline-start:6px;font-weight:600;}

  .empty{text-align:center;padding:36px 12px;color:var(--muted);}
  .empty svg{width:46px;height:46px;opacity:.35;margin-bottom:10px;}
  .empty p{font-size:13px;margin:0;}

  .contact-card{background:#fff;border:1px solid #EAE6DA;border-radius:12px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:9px;animation:fadeUp .25s ease both;}
  .avatar{width:42px;height:42px;border-radius:50%;background:var(--slate);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;}
  .avatar.gold{background:var(--gold);color:var(--navy);}
  .contact-info{flex:1;min-width:0;}
  .contact-name{font-size:14px;font-weight:700;}
  .contact-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .icon-btn{width:34px;height:34px;border-radius:9px;background:var(--off-2);display:flex;align-items:center;justify-content:center;border:none;flex-shrink:0;}
  .icon-btn svg{width:16px;height:16px;stroke:var(--slate);}

  .search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #EAE6DA;border-radius:12px;padding:9px 12px;margin-bottom:14px;}
  .search-bar input{border:none;outline:none;background:transparent;font-family:inherit;font-size:13.5px;flex:1;color:var(--ink);}
  .search-bar svg{width:16px;height:16px;stroke:var(--muted);flex-shrink:0;}

  .pipeline{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin:0 -14px;padding-inline:14px;}
  .stage{min-width:230px;background:#EFECE3;border-radius:14px;padding:10px;flex-shrink:0;}
  .stage-head{display:flex;justify-content:space-between;align-items:center;padding:4px 4px 10px;}
  .stage-name{font-size:13px;font-weight:700;color:var(--navy);}
  .stage-count{font-size:11px;background:#fff;border-radius:20px;padding:2px 8px;color:var(--muted);font-weight:600;}
  .deal-card{background:#fff;border-radius:11px;padding:11px;margin-bottom:8px;border:1px solid #E6E1D3;box-shadow:0 1px 2px rgba(15,27,45,.04);}
  .deal-title{font-size:13px;font-weight:700;margin-bottom:4px;}
  .deal-value{font-size:12.5px;color:var(--gold);font-weight:700;}
  .deal-contact{font-size:11px;color:var(--muted);margin-top:4px;}
  .deal-actions{display:flex;gap:6px;margin-top:9px;}
  .deal-move{flex:1;font-size:11px;padding:6px 4px;border-radius:8px;border:1px solid #E6E1D3;background:var(--off);color:var(--slate);font-family:inherit;font-weight:600;}
  .deal-move:active{background:var(--slate);color:#fff;}

  canvas{width:100%;display:block;background:#fff;border-radius:14px;border:1px solid #EAE6DA;padding:8px;}

  .backup-card{background:#fff;border:1px solid #EAE6DA;border-radius:14px;padding:16px;margin-bottom:14px;}
  .backup-card h4{margin:0 0 6px;font-size:14px;color:var(--navy);}
  .backup-card p{margin:0 0 12px;font-size:12px;color:var(--muted);line-height:1.9;}
  .file-input-label{display:block;text-align:center;padding:12px;border:1.5px dashed #D8D2C2;border-radius:11px;font-size:12.5px;color:var(--slate);font-weight:600;}

  .fab{position:fixed;bottom:82px;left:18px;width:54px;height:54px;border-radius:50%;background:var(--gold);box-shadow:0 6px 16px rgba(201,162,39,.4);display:flex;align-items:center;justify-content:center;border:none;z-index:20;}
  .fab svg{width:24px;height:24px;stroke:var(--navy);}

  nav.bottom{position:fixed;bottom:0;right:0;left:0;background:#fff;border-top:1px solid #EAE6DA;display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:15;}
  nav.bottom button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;font-family:inherit;color:var(--muted);}
  nav.bottom button svg{width:21px;height:21px;stroke:var(--muted);}
  nav.bottom button span{font-size:10.5px;font-weight:600;}
  nav.bottom button.active{color:var(--navy);}
  nav.bottom button.active svg{stroke:var(--gold);}

  .overlay{position:fixed;inset:0;background:rgba(15,27,45,.55);display:none;align-items:flex-end;z-index:50;}
  .overlay.open{display:flex;}
  .sheet{background:#fff;width:100%;border-radius:20px 20px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;}
  .sheet-handle{width:38px;height:4px;background:#E2DED2;border-radius:4px;margin:0 auto 14px;}
  .sheet h3{margin:0 0 14px;font-size:16px;font-weight:800;color:var(--navy);}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
  .field input, .field select, .field textarea{width:100%;border:1px solid #E2DED2;border-radius:10px;padding:10px 12px;font-family:inherit;font-size:13.5px;background:var(--off);color:var(--ink);outline:none;}
  .field textarea{resize:vertical;min-height:60px;}
  .btn-row{display:flex;gap:10px;margin-top:16px;}
  .btn{flex:1;padding:12px;border-radius:11px;border:none;font-family:inherit;font-weight:700;font-size:13.5px;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-ghost{background:var(--off-2);color:var(--navy);}
  .btn-danger{background:#FBEAEA;color:var(--red);}
  .menu-item{display:flex;align-items:center;gap:12px;width:100%;padding:13px 6px;background:none;border:none;border-bottom:1px solid #F0EDE4;text-align:right;font-family:inherit;}
  .menu-item:last-child{border-bottom:none;}
  .menu-item svg{width:19px;height:19px;stroke:var(--slate);flex-shrink:0;}
  .menu-item span{font-size:13.5px;font-weight:600;color:var(--ink);}
</style>
</head>
<body>
<div id="app">

  <header class="top">
    <svg class="peaks" viewBox="0 0 400 100" preserveAspectRatio="none"><polygon points="0,100 60,30 110,70 170,10 230,60 290,25 340,65 400,40 400,100" fill="#C9A227"/></svg>
    <button class="menu-btn" id="menuBtn"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1.4" fill="#fff" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="#fff" stroke="none"/><circle cx="12" cy="19" r="1.4" fill="#fff" stroke="none"/></svg></button>
    <div class="brand">
      <img class="brand-mark" src="icon-192.png" alt="لوگوی اوج وین">
      <div>
        <div class="brand-text">اوج وین CRM</div>
        <div class="brand-sub">مدیریت مشتریان و فروش</div>
      </div>
    </div>
    <div id="pageTitle">
      <div class="page-title">داشبورد</div>
      <div class="page-sub" id="pageSub">نگاهی سریع به وضعیت امروز</div>
    </div>
  </header>

  <main id="main"></main>

  <button class="fab" id="fabBtn"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>

  <nav class="bottom">
    <button data-tab="dashboard" class="active"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg><span>داشبورد</span></button>
    <button data-tab="contacts"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/></svg><span>مخاطبین</span></button>
    <button data-tab="deals"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 12h4l3-8 4 16 3-8h4"/></svg><span>معاملات</span></button>
    <button data-tab="tasks"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 12l2.5 2.5L16 9"/></svg><span>وظایف</span></button>
  </nav>
</div>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

<script>
const STORE_KEY = 'ojwin_crm_data_v2';
const STAGES = ['سرنخ','مذاکره','پیشنهاد قیمت','بسته شده - برد','بسته شده - باخت'];
const STAGES_SHORT = ['سرنخ','مذاکره','پیشنهاد','برد','باخت'];

function emptyData(){
  return { contacts:[], deals:[], tasks:[], products:[], team:[], campaigns:[], calls:[], invoices:[] };
}

function monthsAgoISO(n){
  const d = new Date();
  d.setMonth(d.getMonth()-n);
  return d.toISOString();
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      return Object.assign(emptyData(), parsed);
    }
  }catch(e){}
  return {
    contacts: [
      {id: uid(), name:'شرکت پارسیان تجارت', phone:'021-88451200', address:'مشهد، بلوار وکیل‌آباد', note:'مشتری کلیدی، پیگیری فصلی'},
      {id: uid(), name:'مهندس رضا کیانی', phone:'0912-3456789', address:'مشهد، خیابان احمدآباد', note:'علاقه‌مند به بسته سازمانی'}
    ],
    deals: [
      {id: uid(), title:'قرارداد نرم‌افزار حسابداری', value:45000000, stage:0, contact:'شرکت پارسیان تجارت', productId:null, assignee:null, createdAt: monthsAgoISO(0)},
      {id: uid(), title:'تمدید اشتراک سالانه', value:12000000, stage:3, contact:'مهندس رضا کیانی', productId:null, assignee:null, createdAt: monthsAgoISO(1)},
      {id: uid(), title:'بسته آموزش فروش', value:8000000, stage:3, contact:'شرکت پارسیان تجارت', productId:null, assignee:null, createdAt: monthsAgoISO(2)},
      {id: uid(), title:'اشتراک پایه', value:5000000, stage:4, contact:'مهندس رضا کیانی', productId:null, assignee:null, createdAt: monthsAgoISO(3)}
    ],
    tasks: [
      {id: uid(), title:'تماس پیگیری با پارسیان تجارت', due: todayISO(), time:'', done:false, assignee:null, notified:false},
      {id: uid(), title:'ارسال پیش‌فاکتور برای رضا کیانی', due: todayISO(), time:'', done:false, assignee:null, notified:false}
    ],
    products: [
      {id: uid(), name:'اشتراک سالانه پایه', price:12000000, description:'دسترسی کامل به امکانات پایه برای یک سال'},
      {id: uid(), name:'بسته سازمانی', price:45000000, description:'مناسب تیم‌های فروش بزرگ با پشتیبانی اختصاصی'}
    ],
    team: [
      {id: uid(), name:'سارا محمدی', role:'کارشناس فروش', phone:'0935-1112233'}
    ],
    campaigns: [
      {id: uid(), name:'کمپین نوروزی اینستاگرام', channel:'اینستاگرام', budget:8000000, startDate: todayISO(), endDate: todayISO(), status:'در حال اجرا', notes:'تخفیف ۲۰٪ برای مشتریان جدید'}
    ],
    calls: [],
    invoices: []
  };
}
function saveData(){ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
function uid(){ return Math.random().toString(36).slice(2,10); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtMoney(n){ return Number(n||0).toLocaleString('fa-IR') + ' تومان'; }
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('fa-IR', {month:'short', day:'numeric'});
}
function fmtMonthShort(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('fa-IR', {month:'short'});
}
function initials(name){ return (name||'؟').trim().slice(0,1); }

let data = loadData();
let currentTab = 'dashboard';

const main = document.getElementById('main');
const pageTitleEl = document.querySelector('.page-title');
const pageSub = document.getElementById('pageSub');
const overlay = document.getElementById('overlay');
const sheet = document.getElementById('sheet');
const fabBtn = document.getElementById('fabBtn');

document.querySelectorAll('nav.bottom button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.bottom button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render();
  });
});
fabBtn.addEventListener('click', ()=>{
  if(currentTab==='contacts') openContactForm();
  else if(currentTab==='deals') openDealForm();
  else if(currentTab==='tasks') openTaskForm();
  else if(currentTab==='products') openProductForm();
  else if(currentTab==='team') openTeamForm();
  else if(currentTab==='campaigns') openCampaignForm();
  else if(currentTab==='calls') openCallForm();
  else if(currentTab==='invoices') openInvoiceTypeChooser();
  else openTaskForm();
});
document.getElementById('menuBtn').addEventListener('click', openMoreMenu);
overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeSheet(); });

function closeSheet(){ overlay.classList.remove('open'); sheet.innerHTML=''; }
function openSheet(html){ sheet.innerHTML = '<div class="sheet-handle"></div>' + html; overlay.classList.add('open'); }

function openMoreMenu(){
  openSheet(`
    <h3>صفحات بیشتر</h3>
    <button class="menu-item" data-go="reports"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 3v18h18M7 15l4-5 3 3 5-7"/></svg><span>گزارش و نمودار فروش</span></button>
    <button class="menu-item" data-go="products"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 7L12 3 4 7v10l8 4 8-4V7z"/><path d="M4 7l8 4 8-4M12 11v10"/></svg><span>محصولات و خدمات</span></button>
    <button class="menu-item" data-go="team"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.5 3-6 6.5-6s6.5 2.5 6.5 6"/><circle cx="17" cy="8" r="2.6"/><path d="M15.5 14.2c2.7.5 4.5 2.7 4.5 5.8"/></svg><span>تیم و کارمندان</span></button>
    <button class="menu-item" data-go="campaigns"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 11v2a2 2 0 002 2h1l2 5h2l-1.5-5H12l7 3V6l-7 3H6a2 2 0 00-2 2z"/><path d="M17 9v6"/></svg><span>کمپین‌های تبلیغاتی</span></button>
    <button class="menu-item" data-go="calls"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 5c0 9 7 16 16 16l3-4-6-3-2 2c-2-1-4-3-5-5l2-2-3-6-4 1z"/></svg><span>ثبت تماس مشتری</span></button>
    <button class="menu-item" data-go="invoices"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M6 2h9l5 5v15a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M9 12h6M9 16h6M9 8h3"/></svg><span>صدور پیش‌فاکتور</span></button>
    <button class="menu-item" data-go="meshcalc"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg><span>محاسبه قیمت توری پلیسه</span></button>
    <button class="menu-item" data-go="backup"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg><span>پشتیبان‌گیری و بازیابی</span></button>
  `);
  sheet.querySelectorAll('[data-go]').forEach(b=> b.addEventListener('click', ()=>{
    document.querySelectorAll('nav.bottom button').forEach(x=>x.classList.remove('active'));
    currentTab = b.dataset.go;
    closeSheet();
    render();
  }));
}

function render(){
  const titles = {
    dashboard:['داشبورد','نگاهی سریع به وضعیت امروز'],
    contacts:['مخاطبین','فهرست مشتریان و مخاطبین شما'],
    deals:['معاملات','پایپ‌لاین فروش شما'],
    tasks:['وظایف','کارهای امروز و آینده'],
    reports:['گزارش‌ها','روند فروش و عملکرد تیم'],
    products:['محصولات و خدمات','فهرست چیزهایی که می‌فروشید'],
    team:['تیم و کارمندان','اعضای تیم فروش شما'],
    campaigns:['کمپین‌های تبلیغاتی','مدیریت کمپین‌های بازاریابی'],
    calls:['ثبت تماس مشتری','لیست تماس‌های ثبت‌شده'],
    meshcalc:['محاسبه قیمت توری پلیسه','بر اساس ابعاد و رنگ فریم'],
    invoices:['پیش‌فاکتورها','صدور و مدیریت پیش‌فاکتور'],
    backup:['پشتیبان‌گیری','خروجی، ورودی و پاک‌سازی اطلاعات']
  };
  pageTitleEl.textContent = titles[currentTab][0];
  pageSub.textContent = titles[currentTab][1];

  if(currentTab==='dashboard') renderDashboard();
  else if(currentTab==='contacts') renderContacts();
  else if(currentTab==='deals') renderDeals();
  else if(currentTab==='tasks') renderTasks();
  else if(currentTab==='reports') renderReports();
  else if(currentTab==='products') renderProducts();
  else if(currentTab==='team') renderTeam();
  else if(currentTab==='campaigns') renderCampaigns();
  else if(currentTab==='calls') renderCalls();
  else if(currentTab==='meshcalc') renderMeshCalc();
  else if(currentTab==='invoices') renderInvoices();
  else if(currentTab==='backup') renderBackup();

  updateFab();
}

    ${done.length? `<div class="section-title" style="margin-top:18px;">انجام‌شده <small>${done.length} مورد</small></div><div id="doneTasks">${done.map(taskRowHTML).join('')}</div>`:''}

function taskRowHTML(t){
  const assigneeName = t.assignee ? (data.team.find(x=>x.id===t.assignee)||{}).name : null;
  return `<div class="task-row ${t.done?'done':''}" data-task-id="${t.id}">

    </div>
  </div>`;
}
function attachTaskHandlers(scope){
  scope.querySelectorAll('[data-check]').forEach(el=> el.addEventListener('click', ()=>{
    const t = data.tasks.find(x=>x.id===el.dataset.check);

}

  'قهوه‌ای': 3550000,

  'بژ': 4200000

function fmtDateFull(iso){
  if(!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('fa-IR', {year:'numeric', month:'long', day:'numeric'});
}
function fmtDateJalaliLatin(iso){
  if(!iso) return '-';
  const d = new Date(iso);
  try{
    return d.toLocaleDateString('fa-IR-u-nu-latn', {year:'numeric', month:'2-digit', day:'2-digit'});
  }catch(e){
    return d.toLocaleDateString('fa-IR', {year:'numeric', month:'2-digit', day:'2-digit'});
  }
}
function fmtMoneyLatin(n){ return Number(n||0).toLocaleString('en-US'); }

function meshLineTotal(it){
  const areaPerUnit = Math.max((Number(it.widthCm||0)/100) * (Number(it.heightCm||0)/100), 1);
  return Math.round(areaPerUnit * Number(it.qty||1) * Number(it.unitPrice||0));
}
function lineTotalFor(inv, it){
  return inv.type==='mesh' ? meshLineTotal(it) : Number(it.qty||0)*Number(it.unitPrice||0);
}
function invoiceTotal(inv){
  const subtotal = inv.items.reduce((s,it)=> s + lineTotalFor(inv,it), 0);
  return Math.max(0, subtotal - Number(inv.discount||0));
}

function renderInvoiceSheet(id){
  const type = invoiceDraft.type;
  const contactOptions = data.contacts.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
  const itemsHtml = invoiceDraft.items.map((it,idx)=> invoiceItemRowHTML(it, idx, type)).join('');

  openSheet(`
    <h3>${id?'ویرایش':''} پیش‌فاکتور ${INVOICE_TYPE_LABELS[type]}</h3>
    <div class="field"><label>موضوع</label><input id="inv_subject" value="${invoiceDraft.subject||INVOICE_SUBJECTS[type]}"></div>
    <div class="field"><label>انتخاب از مخاطبین (اختیاری)</label><select id="inv_contact"><option value="">— متفرقه / وارد کنید —</option>${contactOptions}</select></div>
    <div class="field"><label>نام مشتری</label><input id="inv_contactName" value="${invoiceDraft.contact||''}" placeholder="نام مشتری"></div>
    <div class="field"><label>شماره تماس</label><input id="inv_phone" value="${invoiceDraft.phone||''}" placeholder="0912xxxxxxx"></div>
    <div class="field"><label>تاریخ</label><input id="inv_date" type="date" value="${invoiceDraft.date}"></div>
    <div class="field"><label>تاریخ تحویل</label><input id="inv_deliver" type="date" value="${invoiceDraft.deliverDate||invoiceDraft.date}"></div>
    <div class="section-title" style="margin-top:4px;">اقلام پیش‌فاکتور</div>
    <div id="inv_items">${itemsHtml}</div>
    <button class="btn btn-ghost" id="inv_addItem" style="width:100%;margin-bottom:14px;">+ افزودن ردیف</button>
    <div class="field"><label>تخفیف (تومان)</label><input id="inv_discount" type="number" value="${invoiceDraft.discount||0}"></div>
    <div class="field"><label>توضیحات</label><textarea id="inv_notes">${invoiceDraft.notes||''}</textarea></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="inv_save">${id?'ذخیره تغییرات':'ثبت پیش‌فاکتور'}</button>
      ${id?'<button class="btn btn-danger" id="inv_delete">حذف</button>':''}
    </div>
  `);

  function captureDraft(){
    invoiceDraft.subject = document.getElementById('inv_subject').value.trim();
    invoiceDraft.contact = document.getElementById('inv_contactName').value.trim();
    invoiceDraft.phone = document.getElementById('inv_phone').value.trim();
    invoiceDraft.date = document.getElementById('inv_date').value || todayISO();
    invoiceDraft.deliverDate = document.getElementById('inv_deliver').value || invoiceDraft.date;
    invoiceDraft.discount = Number(document.getElementById('inv_discount').value||0);
    invoiceDraft.notes = document.getElementById('inv_notes').value.trim();
  }

  document.getElementById('inv_contact').addEventListener('change', (e)=>{
    const c = data.contacts.find(x=>x.name===e.target.value);
    if(c){
      document.getElementById('inv_contactName').value = c.name;
      document.getElementById('inv_phone').value = c.phone||'';
    }
  });

  document.querySelectorAll('[data-item-field]').forEach(inp=>{
    const handler = (e)=>{
      const idx = Number(e.target.dataset.idx);
      const field = e.target.dataset.itemField;
      const isTextField = (field==='name' || field==='product' || field==='description');
      invoiceDraft.items[idx][field] = isTextField ? e.target.value : Number(e.target.value||0);
      const span = document.getElementById('lt_'+idx);
      if(span){
        const lt = type==='mesh' ? meshLineTotal(invoiceDraft.items[idx]) : Number(invoiceDraft.items[idx].qty||0)*Number(invoiceDraft.items[idx].unitPrice||0);
        span.textContent = fmtMoney(lt);
      }
    };
    inp.addEventListener('input', handler);
    inp.addEventListener('change', handler);
  });

  document.querySelectorAll('.frameColorSelect').forEach(sel=>{
    sel.addEventListener('change', (e)=>{
      captureDraft();
      const idx = Number(e.target.dataset.idx);
      const color = e.target.value;
      invoiceDraft.items[idx].frameColor = color;
      invoiceDraft.items[idx].unitPrice = MESH_PRICES[color];
      renderInvoiceSheet(id);
    });
  });

  document.querySelectorAll('[data-remove-item]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      captureDraft();
      const idx = Number(btn.dataset.removeItem);
      invoiceDraft.items.splice(idx,1);
      if(invoiceDraft.items.length===0) invoiceDraft.items.push(type==='mesh'? defaultMeshItem() : defaultWindowItem());
      renderInvoiceSheet(id);
    });
  });
  document.getElementById('inv_addItem').addEventListener('click', ()=>{
    captureDraft();
    invoiceDraft.items.push(type==='mesh'? defaultMeshItem() : defaultWindowItem());
    renderInvoiceSheet(id);
  });
  document.getElementById('inv_save').addEventListener('click', ()=>{
    captureDraft();
    const validItems = type==='mesh'
      ? invoiceDraft.items.filter(it=> it.product && it.frameColor && Number(it.widthCm)>0 && Number(it.heightCm)>0)
      : invoiceDraft.items.filter(it=> String(it.name||'').trim());
    if(validItems.length===0){ alert(type==='mesh' ? 'حداقل یک ردیف با عرض و ارتفاع درست وارد کن.' : 'حداقل یک قلم کالا یا خدمت وارد کن.'); return; }
    const payload = {type, subject:invoiceDraft.subject, contact:invoiceDraft.contact, phone:invoiceDraft.phone, date:invoiceDraft.date, deliverDate:invoiceDraft.deliverDate, items:validItems, discount:invoiceDraft.discount, notes:invoiceDraft.notes};
    if(id){
      Object.assign(data.invoices.find(x=>x.id===id), payload);
    } else {
      const number = (data.invoices.length ? Math.max(...data.invoices.map(x=>x.number||1000100)) : 1000100) + 1;
      data.invoices.push({id:uid(), number, ...payload});
    }
    saveData(); closeSheet(); render();
  });
  if(id){ document.getElementById('inv_delete').addEventListener('click', ()=>{
    data.invoices = data.invoices.filter(x=>x.id!==id);
    saveData(); closeSheet(); render();
  });}
}

function setupCanvas(id, cssHeight){
  const canvas = document.getElementById(id);
  const dpr = window.devicePixelRatio || 1;
  const cssWidth = canvas.parentElement.clientWidth - 18;
  canvas.width = cssWidth*dpr; canvas.height = cssHeight*dpr;
  canvas.style.width = cssWidth+'px'; canvas.style.height = cssHeight+'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,cssWidth,cssHeight);
  return {ctx, w:cssWidth, h:cssHeight};
}
function roundRectFill(ctx,x,y,w,h,r){
  if(h<=0.5) return;
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  ctx.fill();
}
function drawBarChart(id, labels, values, color){
  const {ctx,w,h} = setupCanvas(id, 170);
  const max = Math.max(...values, 1);
  const padding = 10;
  const bottomPad = 30;
  const chartH = h - bottomPad - 14;
  const gap = 10;
  const barW = (w - padding*2 - gap*(values.length-1)) / values.length;
  ctx.font = '11px Vazirmatn, Tahoma, sans-serif';
  ctx.textAlign = 'center';
  values.forEach((v,i)=>{
    const barH = max ? (v/max)*chartH : 0;
    const x = padding + i*(barW+gap);
    const y = chartH - barH + 14;
    ctx.fillStyle = color;
    roundRectFill(ctx, x, y, barW, barH, 6);
    ctx.fillStyle = '#0F1B2D';
    ctx.fillText(String(v), x+barW/2, y-6);
    ctx.fillStyle = '#6B7686';
    ctx.fillText(labels[i], x+barW/2, chartH+30);
  });
}
function drawLineChart(id, labels, values, color){
  const {ctx,w,h} = setupCanvas(id, 150);
  const max = Math.max(...values, 1);
  const padding = 12;
  const bottomPad = 26;
  const chartH = h - bottomPad - 14;
  const stepX = (w - padding*2) / (values.length-1 || 1);
  const pts = values.map((v,i)=> ({x: padding + i*stepX, y: chartH - (max? (v/max)*chartH:0) + 10}));

  const grad = ctx.createLinearGradient(0,10,0,chartH+10);
  grad.addColorStop(0, 'rgba(201,162,39,.35)');
  grad.addColorStop(1, 'rgba(201,162,39,0)');
  ctx.beginPath();
  ctx.moveTo(pts[0].x, chartH+10);
  pts.forEach(p=> ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x, chartH+10);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  pts.forEach((p,i)=> i===0? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.4;
  ctx.lineJoin='round';
  ctx.stroke();

  ctx.font = '11px Vazirmatn, Tahoma, sans-serif';
  ctx.textAlign = 'center';
  pts.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,3.4,0,Math.PI*2);
    ctx.fillStyle = '#0F1B2D';
    ctx.fill();
    ctx.fillStyle = '#6B7686';
    ctx.fillText(labels[i], p.x, chartH+30);
  });
}

  `;
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importFile').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    importData(file);
  });
  document.getElementById('resetBtn').addEventListener('click', ()=>{
    if(confirm('مطمئنی می‌خوای همه اطلاعات پاک بشه؟ این کار قابل بازگشت نیست.')){
      data = emptyData();
      saveData(); render();
    }
  });
}
function exportData(){
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ojwin-crm-backup-' + todayISO() + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function importData(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed || typeof parsed !== 'object') throw new Error('invalid');
      if(!confirm('اطلاعات فعلی این دستگاه با محتوای فایل جایگزین می‌شود. ادامه می‌دهی؟')) return;
      data = Object.assign(emptyData(), parsed);
      saveData(); render();
      alert('بازیابی با موفقیت انجام شد.');
    }catch(err){
      alert('فایل انتخاب‌شده معتبر نیست.');
    }
  };
  reader.readAsText(file);
}

function checkReminders(){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  let changed = false;
  data.tasks.forEach(t=>{
    if(!t.done && !t.notified && t.time){
      const dt = new Date(t.due + 'T' + t.time);
      if(dt <= now && (now - dt) < 10*60*1000){
        try{ new Notification('یادآوری اوج وین CRM', {body:t.title, icon:'icon-192.png'}); }catch(e){}
        t.notified = true;
        changed = true;
      }
    }
  });
  if(changed) saveData();
}
setInterval(checkReminders, 60000);
setTimeout(checkReminders, 3000);

render();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
